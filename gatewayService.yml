# application.yml
server:
  port: 8080

spring:
  application:
    name: gatewayService
  cloud:
    gateway:
      routes:
        # Route vers user-service
        - id: UserService
          uri: lb://UserService         # lb = load balancer via Eureka
          predicates:
            - Path=/api/users/** , /api/auth/** , /api/test/**
          filters:
            - StripPrefix=0

        # Route vers project-service
        - id: ProjectService
          uri: lb://ProjectService
          predicates:
            - Path=/api/projects/**

      # CORS pour Angular
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods: "*"
            allowedHeaders: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
